workflows:
  build-aab:
    name: Build Android
    max_build_duration: 60
    environment:
      java: 21
    scripts:
      - name: Install Gradle JDK 17 dependency guard
        script: |
          set -euo pipefail
          mkdir -p "$HOME/.gradle/init.d"
          cat > "$HOME/.gradle/init.d/lovable-bouncycastle-jdk17.gradle" <<'GRADLE'
          // LOVABLE_BOUNCY_CASTLE_JDK17_INIT
          def lovableBouncyCastleLegacyVersion = '1.70'

          def alignLovableBouncyCastle = { cfg ->
              cfg.resolutionStrategy.eachDependency { details ->
                  if (details.requested.group == 'org.bouncycastle') {
                      def name = details.requested.name
                      if (name.endsWith('-jdk15on')) {
                          details.useVersion lovableBouncyCastleLegacyVersion
                          details.because 'Bouncy Castle jdk15on 1.70 avoids Java 21 bytecode in newer multi-release jars'
                      } else if (name.endsWith('-jdk18on')) {
                          def replacement = name.replace('-jdk18on', '-jdk15on')
                          details.useTarget group: 'org.bouncycastle', name: replacement, version: lovableBouncyCastleLegacyVersion
                          details.because 'Use Bouncy Castle jdk15on 1.70 because jdk18on 1.78+ ships Java 21 classes that Gradle on JDK 17 cannot instrument'
                      }
                  }
              }
              cfg.resolutionStrategy.force(
                  'org.bouncycastle:bcprov-jdk15on:1.70',
                  'org.bouncycastle:bcpkix-jdk15on:1.70',
                  'org.bouncycastle:bcutil-jdk15on:1.70',
                  'org.bouncycastle:bctls-jdk15on:1.70'
              )
          }

          def alignLovableGooglePlayMinSdk22 = { cfg ->
              cfg.resolutionStrategy.eachDependency { details ->
                  if (details.requested.group == 'com.google.android.gms') {
                      def forced = [
                          'play-services-ads': '23.6.0',
                          'play-services-ads-lite': '23.6.0',
                          'play-services-ads-base': '23.6.0',
                          'play-services-ads-identifier': '18.0.0',
                          'play-services-appset': '16.0.1',
                          'play-services-base': '18.7.2',
                          'play-services-basement': '18.7.1',
                          'play-services-tasks': '18.3.2'
                      ][details.requested.name]
                      if (forced != null) {
                          details.useVersion forced
                          details.because 'Keep Google Play services compatible with app minSdk 22; newer releases require minSdk 23+'
                      }
                  }
                  if (details.requested.group == 'com.google.android.ump' && details.requested.name == 'user-messaging-platform') {
                      details.useVersion '3.0.0'
                      details.because 'Mobile Ads 23.6.0 companion UMP release remains compatible with minSdk 22'
                  }
              }
              cfg.resolutionStrategy.force(
                  'com.google.android.gms:play-services-ads:23.6.0',
                  'com.google.android.gms:play-services-ads-lite:23.6.0',
                  'com.google.android.gms:play-services-ads-base:23.6.0',
                  'com.google.android.gms:play-services-ads-identifier:18.0.0',
                  'com.google.android.gms:play-services-appset:16.0.1',
                  'com.google.android.gms:play-services-base:18.7.2',
                  'com.google.android.gms:play-services-basement:18.7.1',
                  'com.google.android.gms:play-services-tasks:18.3.2',
                  'com.google.android.ump:user-messaging-platform:3.0.0'
              )
          }

          def alignLovableAndroidDependencies = { cfg ->
              alignLovableBouncyCastle(cfg)
              alignLovableGooglePlayMinSdk22(cfg)
          }

          // Patch the settings-level buildscript BEFORE pluginManagement resolves AGP.
          // This is critical: AGP's transitive Bouncy Castle dependency is fetched from
          // the settings/pluginManagement classpath, which `beforeProject` runs too late for.
          gradle.beforeSettings { settings ->
              settings.buildscript.configurations.configureEach { cfg -> alignLovableAndroidDependencies(cfg) }
          }
          gradle.settingsEvaluated { settings ->
              settings.buildscript.configurations.configureEach { cfg -> alignLovableAndroidDependencies(cfg) }
          }
          gradle.beforeProject { project ->
              project.buildscript.repositories { repos ->
                  repos.mavenCentral()
                  repos.google()
                  repos.gradlePluginPortal()
              }
              project.repositories { repos ->
                  repos.mavenCentral()
                  repos.google()
              }
              project.buildscript.configurations.configureEach { cfg -> alignLovableAndroidDependencies(cfg) }
              project.configurations.configureEach { cfg -> alignLovableAndroidDependencies(cfg) }
          }
          GRADLE

          rm -rf \
            "$HOME/.gradle/caches/modules-2/files-2.1/org.bouncycastle/bcprov-jdk18on/1.79" \
            "$HOME/.gradle/caches/modules-2/files-2.1/org.bouncycastle/bcpkix-jdk18on/1.79" \
            "$HOME/.gradle/caches/modules-2/files-2.1/org.bouncycastle/bcutil-jdk18on/1.79" \
            "$HOME/.gradle/caches/modules-2/files-2.1/org.bouncycastle/bctls-jdk18on/1.79" \
            "$HOME/.gradle/caches/modules-2/files-2.1/org.bouncycastle/bcprov-jdk18on/1.78.1" \
            "$HOME/.gradle/caches/modules-2/files-2.1/org.bouncycastle/bcpkix-jdk18on/1.78.1" \
            "$HOME/.gradle/caches/modules-2/files-2.1/org.bouncycastle/bcutil-jdk18on/1.78.1" \
            "$HOME/.gradle/caches/modules-2/files-2.1/org.bouncycastle/bctls-jdk18on/1.78.1" \
            "$HOME/.gradle/caches/modules-2/files-2.1/org.bouncycastle/bcprov-jdk15on/1.78.1" \
            "$HOME/.gradle/caches/modules-2/files-2.1/org.bouncycastle/bcpkix-jdk15on/1.78.1" \
            "$HOME/.gradle/caches/modules-2/files-2.1/org.bouncycastle/bcutil-jdk15on/1.78.1" \
            "$HOME/.gradle/caches/modules-2/files-2.1/org.bouncycastle/bctls-jdk15on/1.78.1" \
            "$HOME/.gradle/caches/jars-9"
          grep -q 'LOVABLE_BOUNCY_CASTLE_JDK17_INIT' "$HOME/.gradle/init.d/lovable-bouncycastle-jdk17.gradle"
          echo "✅ Gradle JDK 17 dependency guard installed."
      - name: Verify Android template exists
        script: |
          test -f "$CM_BUILD_DIR/android-template/settings.gradle"
          test -f "$CM_BUILD_DIR/android-template/build.gradle"
          test -f "$CM_BUILD_DIR/android-template/app/build.gradle"
      - name: Set up Android SDK path
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android-template/local.properties"
      - name: Force Android API 35 target and minSdk 22
        script: |
          set -euo pipefail
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "platforms;android-35" "build-tools;35.0.0" >/dev/null || true
          GRADLE_FILE="$CM_BUILD_DIR/android-template/app/build.gradle"
          perl -0pi -e 's/compileSdk(?:Version)?\s+\d+/compileSdk 35/g; s/targetSdk(?:Version)?\s+\d+/targetSdk 35/g; s/minSdk(?:Version)?\s+\d+/minSdk 22/g' "$GRADLE_FILE"
          grep -Eq 'compileSdk\s+35' "$GRADLE_FILE"
          grep -Eq 'targetSdk\s+35' "$GRADLE_FILE"
          grep -Eq 'minSdk\s+22' "$GRADLE_FILE"
          sed -n '/android {/,/defaultConfig {/p; /defaultConfig {/,/}/p' "$GRADLE_FILE" | grep -E 'compileSdk|targetSdk|minSdk' || true
          echo "✅ Android build is locked to compileSdk 35, targetSdk 35, and minSdk 22."
      - name: Normalize Gradle signing DSL
        script: |
          GRADLE_FILE="$CM_BUILD_DIR/android-template/app/build.gradle"
          perl -0pi -e 's/\bv3SigningEnabled\s*(?:=|\()?\s*true\s*\)?/enableV3Signing = true/g; s/\bv4SigningEnabled\s*(?:=|\()?\s*true\s*\)?/enableV4Signing = true/g' "$GRADLE_FILE"
          if grep -Eq 'v3SigningEnabled|v4SigningEnabled' "$GRADLE_FILE"; then
            echo "❌ Invalid Android Gradle signing DSL remains in app/build.gradle."
            exit 1
          fi
          echo "✅ Gradle signing DSL is compatible with Android Gradle Plugin."
      - name: Write custom code injection files (assets)
        script: |
          ASSETS_DIR="$CM_BUILD_DIR/android-template/app/src/main/assets"
          mkdir -p "$ASSETS_DIR"
          # Custom code is passed as base64 so quotes, newlines, $, backticks and unicode
          # survive Codemagic environment variables and shell execution unchanged.
          decode_asset() {
            VAR_NAME="$1"
            OUT_FILE="$2"
            VALUE="$(printenv "$VAR_NAME" || true)"
            if [ -n "$VALUE" ]; then
              printf '%s' "$VALUE" | base64 --decode > "$OUT_FILE"
            else
              : > "$OUT_FILE"
            fi
          }
          decode_asset CUSTOM_HTML_B64 "$ASSETS_DIR/custom_html.txt"
          decode_asset CUSTOM_CSS_B64  "$ASSETS_DIR/custom_css.txt"
          decode_asset CUSTOM_JS_B64   "$ASSETS_DIR/custom_js.txt"
          echo "Custom code assets written:"
          wc -c "$ASSETS_DIR/custom_html.txt" "$ASSETS_DIR/custom_css.txt" "$ASSETS_DIR/custom_js.txt"
      - name: Download and install launcher icon
        script: |
          set -euo pipefail
          RES_DIR="$CM_BUILD_DIR/android-template/app/src/main/res"
          # Remove every generated/vector launcher icon from previous builds so Android cannot pick a stale logo.
          rm -rf "$RES_DIR"/mipmap-* "$RES_DIR"/drawable-anydpi-v26 2>/dev/null || true
          rm -f "$RES_DIR/drawable/ic_launcher.xml" "$RES_DIR/drawable/ic_launcher.png" "$RES_DIR/drawable/splash_icon."* 2>/dev/null || true
          write_adaptive_icon_xmls() {
            mkdir -p "$RES_DIR/mipmap-anydpi-v26" "$RES_DIR/drawable"
            printf '%s\n' \
              '<?xml version="1.0" encoding="utf-8"?>' \
              '<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">' \
              '    <background android:drawable="@color/ic_launcher_background" />' \
              '    <foreground android:drawable="@mipmap/ic_launcher_foreground" />' \
              '</adaptive-icon>' > "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml"
            cp "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml" "$RES_DIR/mipmap-anydpi-v26/ic_launcher_round.xml"
          }
          # Neutral, user-branded default icon: a flat color square using the
          # app's THEME_COLOR (falls back to a neutral gray if unset). No builder
          # logo, no hardcoded purple circle — this keeps the AAB free of any
          # AABForge branding when the user hasn't uploaded their own icon yet.
          generate_default_resources() {
            echo "Generating neutral default launcher icon (no builder branding)."
            THEME_HEX="${THEME_COLOR:-#6B7280}"
            python3 - "$RES_DIR" "$THEME_HEX" "${APP_NAME:-App}" <<'PY'
          import os, struct, zlib, sys, re
          res_dir, theme_hex, app_name = sys.argv[1], sys.argv[2], sys.argv[3]
          m = re.fullmatch(r"#?([0-9a-fA-F]{6})", theme_hex.strip() or "")
          if m:
              r, g, b = int(m.group(1)[0:2], 16), int(m.group(1)[2:4], 16), int(m.group(1)[4:6], 16)
          else:
              r, g, b = 0x6B, 0x72, 0x80
          initial = (app_name.strip() or "A")[0].upper()
          # 5x7 pixel font — just enough to render a single centered initial glyph so
          # the neutral icon still feels like the user's app instead of a blank tile.
          font = {
              'A': ["01110","10001","10001","11111","10001","10001","10001"],
              'B': ["11110","10001","10001","11110","10001","10001","11110"],
              'C': ["01111","10000","10000","10000","10000","10000","01111"],
              'D': ["11110","10001","10001","10001","10001","10001","11110"],
              'E': ["11111","10000","10000","11110","10000","10000","11111"],
              'F': ["11111","10000","10000","11110","10000","10000","10000"],
              'G': ["01111","10000","10000","10111","10001","10001","01111"],
              'H': ["10001","10001","10001","11111","10001","10001","10001"],
              'I': ["11111","00100","00100","00100","00100","00100","11111"],
              'J': ["00001","00001","00001","00001","10001","10001","01110"],
              'K': ["10001","10010","10100","11000","10100","10010","10001"],
              'L': ["10000","10000","10000","10000","10000","10000","11111"],
              'M': ["10001","11011","10101","10101","10001","10001","10001"],
              'N': ["10001","11001","10101","10101","10011","10001","10001"],
              'O': ["01110","10001","10001","10001","10001","10001","01110"],
              'P': ["11110","10001","10001","11110","10000","10000","10000"],
              'Q': ["01110","10001","10001","10001","10101","10011","01111"],
              'R': ["11110","10001","10001","11110","10100","10010","10001"],
              'S': ["01111","10000","10000","01110","00001","00001","11110"],
              'T': ["11111","00100","00100","00100","00100","00100","00100"],
              'U': ["10001","10001","10001","10001","10001","10001","01110"],
              'V': ["10001","10001","10001","10001","10001","01010","00100"],
              'W': ["10001","10001","10001","10101","10101","11011","10001"],
              'X': ["10001","10001","01010","00100","01010","10001","10001"],
              'Y': ["10001","10001","01010","00100","00100","00100","00100"],
              'Z': ["11111","00001","00010","00100","01000","10000","11111"],
          }
          glyph = font.get(initial, font['A'])
          def png(path, size):
              gh, gw = 7, 5
              scale = max(1, int(size * 0.5 / gh))
              off_x = (size - gw * scale) // 2
              off_y = (size - gh * scale) // 2
              rows = []
              for y in range(size):
                  row = bytearray([0])
                  for x in range(size):
                      cx = (x - off_x) // scale if scale > 0 else -1
                      cy = (y - off_y) // scale if scale > 0 else -1
                      on = 0 <= cx < gw and 0 <= cy < gh and glyph[cy][cx] == '1'
                      if on:
                          row.extend((255, 255, 255, 255))
                      else:
                          row.extend((r, g, b, 255))
                  rows.append(bytes(row))
              raw = b''.join(rows)
              def chunk(tag, data):
                  return struct.pack('>I', len(data)) + tag + data + struct.pack('>I', zlib.crc32(tag + data) & 0xffffffff)
              data = b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', struct.pack('>IIBBBBB', size, size, 8, 6, 0, 0, 0)) + chunk(b'IDAT', zlib.compress(raw, 9)) + chunk(b'IEND', b'')
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, 'wb') as f:
                  f.write(data)
          for folder, legacy_size, adaptive_size in [('mipmap-mdpi',48,108),('mipmap-hdpi',72,162),('mipmap-xhdpi',96,216),('mipmap-xxhdpi',144,324),('mipmap-xxxhdpi',192,432)]:
              out = os.path.join(res_dir, folder)
              os.makedirs(out, exist_ok=True)
              for name in ('ic_launcher.png', 'ic_launcher_round.png'):
                  png(os.path.join(out, name), legacy_size)
              png(os.path.join(out, 'ic_launcher_foreground.png'), adaptive_size)
          png(os.path.join(res_dir, 'drawable', 'splash_icon.png'), 192)
          PY
            write_adaptive_icon_xmls
          }
          # PIL-based fallback: when the user DID upload an icon but ImageMagick
          # is unavailable / fails, we must NOT fall back to the builder default.
          # Instead, resize the user's uploaded PNG directly with Python so the
          # generated launcher icons are still the user's artwork.
          generate_resources_from_upload_with_pil() {
            local SRC="$1"
            echo "Using Python/Pillow fallback to resize uploaded icon."
            python3 - "$RES_DIR" "$SRC" <<'PY' || return 1
          import os, sys
          try:
              from PIL import Image
          except Exception:
              sys.exit(2)
          res_dir, src = sys.argv[1], sys.argv[2]
          try:
              base = Image.open(src).convert("RGBA")
          except Exception as e:
              print("PIL cannot open uploaded icon:", e); sys.exit(3)
          # Square-center-crop then resize so non-square uploads still render clean.
          w, h = base.size
          side = min(w, h)
          base = base.crop(((w-side)//2, (h-side)//2, (w-side)//2+side, (h-side)//2+side))
          for folder, legacy_size, adaptive_size in [('mipmap-mdpi',48,108),('mipmap-hdpi',72,162),('mipmap-xhdpi',96,216),('mipmap-xxhdpi',144,324),('mipmap-xxxhdpi',192,432)]:
              out = os.path.join(res_dir, folder); os.makedirs(out, exist_ok=True)
              legacy = base.resize((legacy_size, legacy_size), Image.LANCZOS)
              legacy.save(os.path.join(out, 'ic_launcher.png'), 'PNG')
              legacy.save(os.path.join(out, 'ic_launcher_round.png'), 'PNG')
              # Adaptive foreground: place the artwork inside the 66dp safe zone.
              inner = int(adaptive_size * 66 / 108)
              fg = Image.new("RGBA", (adaptive_size, adaptive_size), (0,0,0,0))
              art = base.resize((inner, inner), Image.LANCZOS)
              fg.paste(art, ((adaptive_size-inner)//2, (adaptive_size-inner)//2), art)
              fg.save(os.path.join(out, 'ic_launcher_foreground.png'), 'PNG')
          splash = base.resize((384, 384), Image.LANCZOS)
          os.makedirs(os.path.join(res_dir, 'drawable'), exist_ok=True)
          splash.save(os.path.join(res_dir, 'drawable', 'splash_icon.png'), 'PNG')
          PY
            write_adaptive_icon_xmls
          }
          ensure_imagemagick() {
            if ! command -v magick >/dev/null 2>&1 && ! command -v convert >/dev/null 2>&1; then
              echo "Installing ImageMagick for uploaded icon resizing..."
              if [[ "$OSTYPE" == "darwin"* ]] || command -v brew >/dev/null 2>&1; then
                brew install imagemagick || brew install --quiet imagemagick || true
              else
                sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick || true
              fi
            fi
            if command -v magick >/dev/null 2>&1; then IM="magick"; elif command -v convert >/dev/null 2>&1; then IM="convert"; else IM=""; fi
          }
          if [ -z "${ICON_URL:-}" ]; then
            echo "No ICON_URL provided; using default launcher icon."
            generate_default_resources
          else
            ICON_TMP="/tmp/app_icon_src"
            echo "Downloading icon from $ICON_URL"
            if curl -fsSL "$ICON_URL" -o "$ICON_TMP"; then
              ensure_imagemagick
              if [ -n "$IM" ] && $IM "$ICON_TMP" -auto-orient -alpha on -filter Lanczos -resize 1024x1024^ -gravity center -background none -extent 1024x1024 -strip /tmp/app_icon_normalized.png; then
                echo "Using ImageMagick command: $IM"
                for entry in "mipmap-mdpi:48:108" "mipmap-hdpi:72:162" "mipmap-xhdpi:96:216" "mipmap-xxhdpi:144:324" "mipmap-xxxhdpi:192:432"; do
                  FOLDER="${entry%%:*}"
                  REST="${entry#*:}"
                  LEGACY_SIZE="${REST%%:*}"
                  ADAPTIVE_SIZE="${REST##*:}"
                  mkdir -p "$RES_DIR/$FOLDER"
                  # Legacy launcher icons use 48dp density buckets.
                  $IM /tmp/app_icon_normalized.png -filter Lanczos -resize ${LEGACY_SIZE}x${LEGACY_SIZE}^ -gravity center -background none -extent ${LEGACY_SIZE}x${LEGACY_SIZE} -strip "$RES_DIR/$FOLDER/ic_launcher.png"
                  $IM /tmp/app_icon_normalized.png -filter Lanczos -resize ${LEGACY_SIZE}x${LEGACY_SIZE}^ -gravity center -background none -extent ${LEGACY_SIZE}x${LEGACY_SIZE} -strip "$RES_DIR/$FOLDER/ic_launcher_round.png"
                  # Adaptive foregrounds must be 108dp density buckets (up to 432px at xxxhdpi).
                  # The artwork is placed in the safe-zone (~66dp) so launcher masks do not crop it,
                  # while the bitmap itself remains high resolution and will not be upscaled/blurry.
                  INNER=$(( ADAPTIVE_SIZE * 66 / 108 ))
                  $IM /tmp/app_icon_normalized.png -filter Lanczos -resize ${INNER}x${INNER} -gravity center -background none -extent ${ADAPTIVE_SIZE}x${ADAPTIVE_SIZE} -strip "$RES_DIR/$FOLDER/ic_launcher_foreground.png"
                done
                write_adaptive_icon_xmls
                $IM /tmp/app_icon_normalized.png -filter Lanczos -resize 384x384^ -gravity center -background none -extent 384x384 -strip "$RES_DIR/drawable/splash_icon.png"
              else
                echo "Uploaded icon could not be processed; using default launcher icon."
                generate_default_resources
              fi
            else
              echo "Icon download failed; using default launcher icon."
              generate_default_resources
            fi
          fi
          # Verify every required generated resource really exists; fail loudly if not.
          REQUIRED=(
            "$RES_DIR/drawable/splash_icon.png"
            "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml"
            "$RES_DIR/mipmap-anydpi-v26/ic_launcher_round.xml"
          )
          for d in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            REQUIRED+=("$RES_DIR/$d/ic_launcher.png" "$RES_DIR/$d/ic_launcher_round.png" "$RES_DIR/$d/ic_launcher_foreground.png")
          done
          MISSING=0
          for f in "${REQUIRED[@]}"; do
            if [ ! -s "$f" ]; then echo "❌ Missing generated resource: $f"; MISSING=1; fi
          done
          if [ "$MISSING" = "1" ]; then exit 1; fi
          echo "✅ Launcher icons + splash icon generated and verified."
      - name: Decode release signing key
        script: |
          mkdir -p "$CM_BUILD_DIR/android-template/app"
          KS_PATH="$CM_BUILD_DIR/android-template/app/release.jks"
          if [ -z "${CM_KEYSTORE:-}" ]; then
            echo "❌ No release keystore was provided."
            echo "   Open the dashboard → Signing Keys → upload your .jks/.keystore file with the correct alias and passwords,"
            echo "   mark it as default (or select it on the build form), then re-run the build."
            echo "   Play Console requires every uploaded AAB to be signed with your registered upload key."
            exit 1
          else
            if [ -z "${CM_KEYSTORE_PASSWORD:-}" ]; then
              echo "❌ CM_KEYSTORE_PASSWORD must be set when uploading a keystore."
              exit 1
            fi
            if [ -z "${CM_KEY_PASSWORD:-}" ]; then
              CM_KEY_PASSWORD="$CM_KEYSTORE_PASSWORD"
            fi
            echo "$CM_KEYSTORE" | base64 --decode > "$KS_PATH"
            if [ ! -s "$KS_PATH" ]; then
              echo "❌ Keystore decoded to empty file."
              exit 1
            fi
          fi
          if [ -z "${CM_KEYSTORE_PASSWORD:-}" ] || [ -z "${CM_KEY_ALIAS:-}" ] || [ -z "${CM_KEY_PASSWORD:-}" ]; then
            echo "❌ Signing setup did not produce complete credentials."
            exit 1
          fi
          # Verify the keystore opens, then auto-detect the real alias when the user typed it wrong.
          if ! keytool -list -keystore "$KS_PATH" -storepass "$CM_KEYSTORE_PASSWORD" >/tmp/keystore-list.txt 2>&1; then
            cat /tmp/keystore-list.txt
            echo "❌ Keystore store password is invalid. Re-upload the signing key with the correct store password."
            exit 1
          fi
          DETECTED_ALIAS="$(keytool -list -v -keystore "$KS_PATH" -storepass "$CM_KEYSTORE_PASSWORD" 2>/dev/null | awk -F': ' '/Alias name:/ {print $2; exit}')"
          if [ -z "${CM_KEY_ALIAS:-}" ] || ! keytool -list -keystore "$KS_PATH" -storepass "$CM_KEYSTORE_PASSWORD" -alias "$CM_KEY_ALIAS" >/dev/null 2>&1; then
            if [ -n "$DETECTED_ALIAS" ]; then
              echo "⚠️ Supplied key alias was empty or not found; using detected alias: $DETECTED_ALIAS"
              CM_KEY_ALIAS="$DETECTED_ALIAS"
            else
              echo "❌ Could not detect a key alias inside the uploaded keystore."
              exit 1
            fi
          fi
          # Verify the private key password too; if it fails, try the common case where it equals store password.
          if ! keytool -certreq -alias "$CM_KEY_ALIAS" -keystore "$KS_PATH" -storepass "$CM_KEYSTORE_PASSWORD" -keypass "$CM_KEY_PASSWORD" -file /tmp/keycheck.csr >/tmp/keypass-check.txt 2>&1; then
            if keytool -certreq -alias "$CM_KEY_ALIAS" -keystore "$KS_PATH" -storepass "$CM_KEYSTORE_PASSWORD" -keypass "$CM_KEYSTORE_PASSWORD" -file /tmp/keycheck.csr >/dev/null 2>&1; then
              echo "⚠️ Supplied key password failed; using store password as key password for this keystore."
              CM_KEY_PASSWORD="$CM_KEYSTORE_PASSWORD"
            else
              cat /tmp/keypass-check.txt
              echo "❌ Key password is invalid for alias '$CM_KEY_ALIAS'. Re-upload the signing key with the correct key password."
              exit 1
            fi
          fi
          if ! keytool -list -keystore "$KS_PATH" -storepass "$CM_KEYSTORE_PASSWORD" -alias "$CM_KEY_ALIAS" >/dev/null 2>&1; then
            echo "❌ Keystore credentials invalid after alias detection. Re-upload the signing key."
            exit 1
          fi
          PROPS_PATH="$CM_BUILD_DIR/android-template/app/signing.properties"
          {
            echo "storeFile=$KS_PATH"
            printf 'storePasswordB64='; printf '%s' "$CM_KEYSTORE_PASSWORD" | base64 | tr -d '\n'; printf '\n'
            printf 'keyAliasB64='; printf '%s' "$CM_KEY_ALIAS" | base64 | tr -d '\n'; printf '\n'
            printf 'keyPasswordB64='; printf '%s' "$CM_KEY_PASSWORD" | base64 | tr -d '\n'; printf '\n'
          } > "$PROPS_PATH"
          chmod 600 "$PROPS_PATH"
          export CM_KEYSTORE_PATH="$KS_PATH"
          echo "CM_KEYSTORE_PATH=$KS_PATH" >> "$CM_ENV"
          echo "CM_KEY_ALIAS=$CM_KEY_ALIAS" >> "$CM_ENV"
          echo "✅ Release keystore verified: $KS_PATH (alias: $CM_KEY_ALIAS)"
      - name: Apply native feature manifest permissions
        script: |
          set -euo pipefail
          MANIFEST="$CM_BUILD_DIR/android-template/app/src/main/AndroidManifest.xml"
          python3 - "$MANIFEST" <<'PY'
          import os, sys
          manifest_path = sys.argv[1]
          def enabled(name, default=False):
              value = os.environ.get(name)
              if value is None or value.strip() == "":
                  return default
              return value.strip().lower() == "true"
          permissions = []
          def add(name, attrs=""):
              permissions.append(f'    <uses-permission android:name="{name}"{attrs} />')
          if enabled("ENABLE_BILLING"):
              add("com.android.vending.BILLING")
          if enabled("ENABLE_VIBRATE", True):
              add("android.permission.VIBRATE")
          if enabled("ENABLE_CAMERA"):
              add("android.permission.CAMERA")
          if enabled("ENABLE_MICROPHONE"):
              add("android.permission.RECORD_AUDIO")
          if enabled("ENABLE_LOCATION") or enabled("ENABLE_GEOLOCATION"):
              add("android.permission.ACCESS_FINE_LOCATION")
              add("android.permission.ACCESS_COARSE_LOCATION")
          if enabled("ENABLE_STORAGE"):
              add("android.permission.READ_EXTERNAL_STORAGE", ' android:maxSdkVersion="32"')
              add("android.permission.WRITE_EXTERNAL_STORAGE", ' android:maxSdkVersion="29"')
              add("android.permission.READ_MEDIA_IMAGES")
              add("android.permission.READ_MEDIA_VIDEO")
              add("android.permission.READ_MEDIA_AUDIO")
          if enabled("ENABLE_SMS"):
              add("android.permission.SEND_SMS")
              add("android.permission.RECEIVE_SMS")
              add("android.permission.READ_SMS")
          if enabled("ENABLE_CONTACTS"):
              add("android.permission.READ_CONTACTS")
              add("android.permission.WRITE_CONTACTS")
          if enabled("ENABLE_PHONE_STATE"):
              add("android.permission.READ_PHONE_STATE")
              add("android.permission.CALL_PHONE")
          if enabled("ENABLE_PUSH_NOTIFICATIONS"):
              add("android.permission.POST_NOTIFICATIONS")
          if enabled("ENABLE_BIOMETRIC"):
              add("android.permission.USE_BIOMETRIC")
              add("android.permission.USE_FINGERPRINT")
          if enabled("ENABLE_BLUETOOTH"):
              add("android.permission.BLUETOOTH", ' android:maxSdkVersion="30"')
              add("android.permission.BLUETOOTH_ADMIN", ' android:maxSdkVersion="30"')
              add("android.permission.BLUETOOTH_CONNECT")
              add("android.permission.BLUETOOTH_SCAN")
          if enabled("ENABLE_NFC"):
              add("android.permission.NFC")
          if enabled("ENABLE_CALENDAR"):
              add("android.permission.READ_CALENDAR")
              add("android.permission.WRITE_CALENDAR")
          if enabled("KEEP_SCREEN_ON") or enabled("ENABLE_PUSH_NOTIFICATIONS"):
              add("android.permission.WAKE_LOCK")
          text = open(manifest_path, encoding="utf-8").read()
          marker = "\n    <!-- Optional native permissions are inserted by codemagic.yaml only when enabled. -->"
          block = marker + ("\n" + "\n".join(permissions) if permissions else "")
          if marker not in text:
              raise SystemExit("Optional permission marker missing from AndroidManifest.xml")
          text = text.replace(marker, block, 1)
          open(manifest_path, "w", encoding="utf-8").write(text)
          print("Enabled manifest permissions:")
          print("\n".join(permissions) if permissions else "  none")
          PY
      - name: Honor ENABLE_NATIVE_SPLASH toggle
        script: |
          set -euo pipefail
          MANIFEST="$CM_BUILD_DIR/android-template/app/src/main/AndroidManifest.xml"
          SPLASH_ENABLED="${ENABLE_NATIVE_SPLASH:-true}"
          if [ "$(echo "$SPLASH_ENABLED" | tr '[:upper:]' '[:lower:]')" != "true" ]; then
            echo "Native splash disabled — switching launcher activity theme to Theme.AABForge."
            perl -0pi -e 's|android:theme="\@style/Theme\.AABForge\.Splash"|android:theme="\@style/Theme.AABForge"|g' "$MANIFEST"
          else
            echo "Native splash enabled — keeping Theme.AABForge.Splash on launcher activity."
          fi
      - name: Ensure Gradle wrapper exists
        working_directory: android-template
        script: |
          if [ ! -f ./gradlew ]; then
            echo "gradlew missing — generating wrapper with Gradle 8.7"
            gradle wrapper --gradle-version 8.7 --distribution-type bin
          fi
          test -f ./gradlew
          chmod +x ./gradlew
          ls -la ./gradlew
      - name: Build Android artifacts
        working_directory: android-template
        script: |
          set -euo pipefail
          INIT_SCRIPT="$HOME/.gradle/init.d/lovable-bouncycastle-jdk17.gradle"
          test -f "$INIT_SCRIPT" && grep -q 'LOVABLE_BOUNCY_CASTLE_JDK17_INIT' "$INIT_SCRIPT"
          grep -R "LOVABLE_BOUNCY_CASTLE_JDK17_ALIGN" -n build.gradle app/build.gradle || true
          BUILD_TYPE="${BUILD_TYPE:-aab}"
          echo "Building with BUILD_TYPE=$BUILD_TYPE"
          echo "VERSION_NAME=${VERSION_NAME:-<unset>} VERSION_CODE=${VERSION_CODE:-<unset>} PACKAGE_NAME=${PACKAGE_NAME:-<unset>}"
          if [ -z "${PACKAGE_NAME:-}" ]; then
            echo "❌ PACKAGE_NAME is empty. The build form must provide a package name (e.g. com.example.app)."
            exit 1
          fi
          python3 - "$PACKAGE_NAME" <<'PY'
          import re, sys
          value = sys.argv[1].strip()
          if not re.fullmatch(r"[A-Za-z][A-Za-z0-9_]*(\.[A-Za-z][A-Za-z0-9_]*)+", value):
              raise SystemExit(f"❌ Invalid PACKAGE_NAME '{value}'. Use a valid Android package like com.company.app.")
          print(f"✅ PACKAGE_NAME validated: {value}")
          PY
          GRADLE_ARGS=("-PappPackageName=$PACKAGE_NAME")
          if [ -n "${VERSION_CODE:-}" ]; then
            GRADLE_ARGS+=("-PappVersionCode=$VERSION_CODE")
          fi
          if [ -n "${VERSION_NAME:-}" ]; then
            GRADLE_ARGS+=("-PappVersionName=$VERSION_NAME")
          fi
          case "$BUILD_TYPE" in
            apk)
              ./gradlew --init-script "$INIT_SCRIPT" --refresh-dependencies assembleRelease "${GRADLE_ARGS[@]}" --stacktrace --no-daemon
              ;;
            both)
              ./gradlew --init-script "$INIT_SCRIPT" --refresh-dependencies assembleRelease bundleRelease "${GRADLE_ARGS[@]}" --stacktrace --no-daemon
              ;;
            *)
              ./gradlew --init-script "$INIT_SCRIPT" --refresh-dependencies bundleRelease "${GRADLE_ARGS[@]}" --stacktrace --no-daemon
              ;;
          esac
      - name: Verify applicationId matches PACKAGE_NAME
        working_directory: android-template
        script: |
          set -euo pipefail
          EXPECTED="${PACKAGE_NAME:-}"
          if [ -z "$EXPECTED" ]; then
            echo "❌ PACKAGE_NAME env var is missing at verification time."
            exit 1
          fi
          BUILD_TOOLS_DIR="$(ls -d $ANDROID_SDK_ROOT/build-tools/*/ | sort -V | tail -n 1)"
          AAPT2="${BUILD_TOOLS_DIR}aapt2"
          AAB_FILE="$(find app/build/outputs/bundle/release -name '*.aab' | head -n 1 || true)"
          APK_FILE="$(find app/build/outputs/apk/release -name '*.apk' | head -n 1 || true)"
          fail() { echo "❌ $1 applicationId is '$2' but expected '$EXPECTED'. The PACKAGE_NAME env var did not reach Gradle."; exit 1; }
          if [ -n "$AAB_FILE" ]; then
            curl -fsSL -o /tmp/bundletool.jar https://github.com/google/bundletool/releases/download/1.17.2/bundletool-all-1.17.2.jar
            MANIFEST="$(java -jar /tmp/bundletool.jar dump manifest --bundle="$AAB_FILE")"
            ACTUAL="$(echo "$MANIFEST" | grep -oE 'package="[^"]+"' | head -n 1 | sed 's/package="//; s/"//')"
            echo "AAB applicationId: $ACTUAL (expected $EXPECTED)"
            [ "$ACTUAL" = "$EXPECTED" ] || fail "AAB" "$ACTUAL"
          fi
          if [ -n "$APK_FILE" ]; then
            DUMP="$("$AAPT2" dump badging "$APK_FILE" 2>/dev/null || true)"
            ACTUAL="$(echo "$DUMP" | grep -oE "package: name='[^']+'" | head -n 1 | sed "s/package: name='//; s/'//")"
            echo "APK applicationId: $ACTUAL (expected $EXPECTED)"
            [ "$ACTUAL" = "$EXPECTED" ] || fail "APK" "$ACTUAL"
          fi
          echo "✅ applicationId matches PACKAGE_NAME ($EXPECTED)."
      - name: Verify Play target API is 35
        working_directory: android-template
        script: |
          set -euo pipefail
          # Inspect the ACTUAL produced AAB (what Play receives), not an intermediate.
          AAB_FILE="$(find app/build/outputs/bundle/release -name '*.aab' | head -n 1 || true)"
          APK_FILE="$(find app/build/outputs/apk/release -name '*.apk' | head -n 1 || true)"
          BUILD_TOOLS_DIR="$(ls -d $ANDROID_SDK_ROOT/build-tools/*/ | sort -V | tail -n 1)"
          AAPT2="${BUILD_TOOLS_DIR}aapt2"

          check_target_sdk() {
            local file="$1"
            local kind="$2"
            echo "Inspecting $kind: $file"
            if [ "$kind" = "AAB" ]; then
              local manifest
              curl -fsSL -o /tmp/bundletool.jar https://github.com/google/bundletool/releases/download/1.17.2/bundletool-all-1.17.2.jar
              manifest="$(java -jar /tmp/bundletool.jar dump manifest --bundle="$file")"
              echo "$manifest" | grep -i 'targetSdk' || true
              if ! echo "$manifest" | grep -Eq 'targetSdkVersion="35"'; then
                echo "❌ AAB targetSdkVersion is not 35. Play Console will reject this upload."
                exit 1
              fi
            else
              local dump
              dump="$("$AAPT2" dump badging "$file" 2>/dev/null || true)"
              echo "$dump" | grep -Ei "targetSdkVersion|sdkVersion" || true
              if ! echo "$dump" | grep -Eq "targetSdkVersion:'35'"; then
                echo "❌ APK targetSdkVersion is not 35."
                exit 1
              fi
            fi
            echo "✅ $kind targetSdkVersion is 35."
          }

          if [ -n "$AAB_FILE" ]; then check_target_sdk "$AAB_FILE" "AAB"; fi
          if [ -n "$APK_FILE" ]; then check_target_sdk "$APK_FILE" "APK"; fi
          if [ -z "$AAB_FILE" ] && [ -z "$APK_FILE" ]; then
            echo "❌ No AAB or APK produced to verify."
            exit 1
          fi
      - name: Verify APK signature (release, not debug)
        working_directory: android-template
        script: |
          APK_FILE=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -n "$APK_FILE" ]; then
            echo "Verifying $APK_FILE"
            BUILD_TOOLS_DIR=$(ls -d $ANDROID_SDK_ROOT/build-tools/*/ | sort -V | tail -n 1)
            APKSIGNER="${BUILD_TOOLS_DIR}apksigner"
            if [ -x "$APKSIGNER" ]; then
              "$APKSIGNER" verify --print-certs "$APK_FILE" > /tmp/apksig.txt 2>&1 || {
                cat /tmp/apksig.txt
                echo "❌ APK signature verification failed."
                exit 1
              }
              cat /tmp/apksig.txt
              if grep -qi "CN=Android Debug" /tmp/apksig.txt; then
                echo "❌ APK is signed with the DEBUG keystore. Play Console will reject this."
                exit 1
              fi
              echo "✅ APK signed in release mode."
            fi
          fi
      - name: Verify AAB signature (release, not debug)
        working_directory: android-template
        script: |
          set -euo pipefail
          AAB_FILE=$(find app/build/outputs/bundle/release -name "*.aab" | head -n 1 || true)
          if [ -z "${AAB_FILE:-}" ]; then
            echo "No AAB produced, skipping."
            exit 0
          fi
          echo "Inspecting $AAB_FILE"
          rm -f /tmp/aab.sig /tmp/aab_cert.txt /tmp/aab_entries.txt

          # AAB is a zip; META-INF contains the JAR signature block (.RSA/.DSA/.EC).
          # Wildcard matching with `unzip -p` can be inconsistent across unzip
          # implementations (bsdunzip vs Info-ZIP), so list entries first and
          # extract the exact signature filename to a fixed path.
          unzip -Z1 "$AAB_FILE" > /tmp/aab_entries.txt
          SIG_ENTRY=$(grep -iE '^META-INF/.*\.(RSA|DSA|EC)$' /tmp/aab_entries.txt | head -n 1 || true)

          if [ -z "$SIG_ENTRY" ]; then
            echo "❌ AAB has no META-INF signature block — it is unsigned."
            echo "Entries containing META-INF:"
            grep -i '^META-INF/' /tmp/aab_entries.txt || true
            exit 1
          fi

          echo "Found signature entry: $SIG_ENTRY"
          unzip -p "$AAB_FILE" "$SIG_ENTRY" > /tmp/aab.sig
          if [ ! -s /tmp/aab.sig ]; then
            echo "❌ Could not extract signature block from AAB."
            exit 1
          fi

          keytool -printcert -file /tmp/aab.sig > /tmp/aab_cert.txt 2>&1 || {
            echo "❌ keytool failed to parse the signature block:"
            cat /tmp/aab_cert.txt
            exit 1
          }
          cat /tmp/aab_cert.txt
          if grep -qi "CN=Android Debug" /tmp/aab_cert.txt; then
            echo "❌ AAB is signed with the DEBUG keystore. Play Console will reject this upload."
            exit 1
          fi
          echo "✅ AAB signed in release mode — safe to upload to Play Console."
    artifacts:
      - android-template/app/build/outputs/**/*.aab
      - android-template/app/build/outputs/**/*.apk
      - android-template/app/build/outputs/**/mapping.txt

  capacitor-aab:
    name: Build Capacitor AAB
    max_build_duration: 90
    environment:
      java: 21
      node: 20
    scripts:
      - name: Install Gradle JDK 17 dependency guard
        script: |
          set -euo pipefail
          mkdir -p "$HOME/.gradle/init.d"
          cat > "$HOME/.gradle/init.d/lovable-bouncycastle-jdk17.gradle" <<'GRADLE'
          // LOVABLE_BOUNCY_CASTLE_JDK17_INIT
          def lovableBouncyCastleLegacyVersion = '1.70'

          def alignLovableBouncyCastle = { cfg ->
              cfg.resolutionStrategy.eachDependency { details ->
                  if (details.requested.group == 'org.bouncycastle') {
                      def name = details.requested.name
                      if (name.endsWith('-jdk15on')) {
                          details.useVersion lovableBouncyCastleLegacyVersion
                          details.because 'Bouncy Castle jdk15on 1.70 avoids Java 21 bytecode in newer multi-release jars'
                      } else if (name.endsWith('-jdk18on')) {
                          def replacement = name.replace('-jdk18on', '-jdk15on')
                          details.useTarget group: 'org.bouncycastle', name: replacement, version: lovableBouncyCastleLegacyVersion
                          details.because 'Use Bouncy Castle jdk15on 1.70 because jdk18on 1.78+ ships Java 21 classes that Gradle on JDK 17 cannot instrument'
                      }
                  }
              }
              cfg.resolutionStrategy.force(
                  'org.bouncycastle:bcprov-jdk15on:1.70',
                  'org.bouncycastle:bcpkix-jdk15on:1.70',
                  'org.bouncycastle:bcutil-jdk15on:1.70',
                  'org.bouncycastle:bctls-jdk15on:1.70'
              )
          }

          def alignLovableGooglePlayMinSdk22 = { cfg ->
              cfg.resolutionStrategy.eachDependency { details ->
                  if (details.requested.group == 'com.google.android.gms') {
                      def forced = [
                          'play-services-ads': '23.6.0',
                          'play-services-ads-lite': '23.6.0',
                          'play-services-ads-base': '23.6.0',
                          'play-services-ads-identifier': '18.0.0',
                          'play-services-appset': '16.0.1',
                          'play-services-base': '18.7.2',
                          'play-services-basement': '18.7.1',
                          'play-services-tasks': '18.3.2'
                      ][details.requested.name]
                      if (forced != null) {
                          details.useVersion forced
                          details.because 'Keep Google Play services compatible with app minSdk 22; newer releases require minSdk 23+'
                      }
                  }
                  if (details.requested.group == 'com.google.android.ump' && details.requested.name == 'user-messaging-platform') {
                      details.useVersion '3.0.0'
                      details.because 'Mobile Ads 23.6.0 companion UMP release remains compatible with minSdk 22'
                  }
              }
              cfg.resolutionStrategy.force(
                  'com.google.android.gms:play-services-ads:23.6.0',
                  'com.google.android.gms:play-services-ads-lite:23.6.0',
                  'com.google.android.gms:play-services-ads-base:23.6.0',
                  'com.google.android.gms:play-services-ads-identifier:18.0.0',
                  'com.google.android.gms:play-services-appset:16.0.1',
                  'com.google.android.gms:play-services-base:18.7.2',
                  'com.google.android.gms:play-services-basement:18.7.1',
                  'com.google.android.gms:play-services-tasks:18.3.2',
                  'com.google.android.ump:user-messaging-platform:3.0.0'
              )
          }

          def alignLovableAndroidDependencies = { cfg ->
              alignLovableBouncyCastle(cfg)
              alignLovableGooglePlayMinSdk22(cfg)
          }

          // Patch the settings-level buildscript BEFORE pluginManagement resolves AGP.
          gradle.beforeSettings { settings ->
              settings.buildscript.configurations.configureEach { cfg -> alignLovableAndroidDependencies(cfg) }
          }
          gradle.settingsEvaluated { settings ->
              settings.buildscript.configurations.configureEach { cfg -> alignLovableAndroidDependencies(cfg) }
          }
          gradle.beforeProject { project ->
              project.buildscript.repositories { repos ->
                  repos.mavenCentral()
                  repos.google()
                  repos.gradlePluginPortal()
              }
              project.repositories { repos ->
                  repos.mavenCentral()
                  repos.google()
              }
              project.buildscript.configurations.configureEach { cfg -> alignLovableAndroidDependencies(cfg) }
              project.configurations.configureEach { cfg -> alignLovableAndroidDependencies(cfg) }
          }
          GRADLE

          rm -rf \
            "$HOME/.gradle/caches/modules-2/files-2.1/org.bouncycastle/bcprov-jdk18on/1.79" \
            "$HOME/.gradle/caches/modules-2/files-2.1/org.bouncycastle/bcpkix-jdk18on/1.79" \
            "$HOME/.gradle/caches/modules-2/files-2.1/org.bouncycastle/bcutil-jdk18on/1.79" \
            "$HOME/.gradle/caches/modules-2/files-2.1/org.bouncycastle/bctls-jdk18on/1.79" \
            "$HOME/.gradle/caches/modules-2/files-2.1/org.bouncycastle/bcprov-jdk18on/1.78.1" \
            "$HOME/.gradle/caches/modules-2/files-2.1/org.bouncycastle/bcpkix-jdk18on/1.78.1" \
            "$HOME/.gradle/caches/modules-2/files-2.1/org.bouncycastle/bcutil-jdk18on/1.78.1" \
            "$HOME/.gradle/caches/modules-2/files-2.1/org.bouncycastle/bctls-jdk18on/1.78.1" \
            "$HOME/.gradle/caches/modules-2/files-2.1/org.bouncycastle/bcprov-jdk15on/1.78.1" \
            "$HOME/.gradle/caches/modules-2/files-2.1/org.bouncycastle/bcpkix-jdk15on/1.78.1" \
            "$HOME/.gradle/caches/modules-2/files-2.1/org.bouncycastle/bcutil-jdk15on/1.78.1" \
            "$HOME/.gradle/caches/modules-2/files-2.1/org.bouncycastle/bctls-jdk15on/1.78.1" \
            "$HOME/.gradle/caches/jars-9"
          grep -q 'LOVABLE_BOUNCY_CASTLE_JDK17_INIT' "$HOME/.gradle/init.d/lovable-bouncycastle-jdk17.gradle"
          echo "✅ Gradle JDK 17 dependency guard installed."
      - name: Validate Capacitor build inputs
        script: |
          set -euo pipefail
          : "${PROJECT_ZIP_URL:?PROJECT_ZIP_URL required}"
          : "${PACKAGE_NAME:?PACKAGE_NAME required}"
          : "${APP_NAME:?APP_NAME required}"
          : "${VERSION_NAME:?VERSION_NAME required}"
          : "${VERSION_CODE:?VERSION_CODE required}"
          : "${CM_KEYSTORE:?Release keystore required}"
          : "${CM_KEYSTORE_PASSWORD:?Keystore password required}"
          echo "✅ Capacitor build inputs present"
      - name: Download and unzip Capacitor project
        script: |
          set -euo pipefail
          mkdir -p "$CM_BUILD_DIR/user-project"
          curl -fsSL "$PROJECT_ZIP_URL" -o /tmp/project.zip
          ls -la /tmp/project.zip
          unzip -q /tmp/project.zip -d /tmp/project-unzipped
          # If the zip has a single top-level dir, descend into it
          ROOT="/tmp/project-unzipped"
          ENTRIES=("$ROOT"/*)
          if [ ${#ENTRIES[@]} -eq 1 ] && [ -d "${ENTRIES[0]}" ]; then
            ROOT="${ENTRIES[0]}"
          fi
          cp -R "$ROOT"/. "$CM_BUILD_DIR/user-project/"
          cd "$CM_BUILD_DIR/user-project"
          test -f package.json || { echo "❌ package.json not found in uploaded project"; exit 1; }
          if [ ! -f capacitor.config.ts ] && [ ! -f capacitor.config.json ]; then
            echo "⚠️  No capacitor.config.{ts,json} — apply-overrides will scaffold one"
          fi
          echo "Project ready at $CM_BUILD_DIR/user-project"
      - name: Apply build-form overrides (appId, version, AdMob)
        script: |
          set -euo pipefail
          PROJECT_DIR="$CM_BUILD_DIR/user-project" \
          APP_ID="$PACKAGE_NAME" \
          APP_NAME="$APP_NAME" \
          VERSION_NAME="$VERSION_NAME" \
          VERSION_CODE="$VERSION_CODE" \
          ADMOB_APP_ID="${ADMOB_APP_ID:-}" ADMOB_BANNER_ID="${ADMOB_BANNER_ID:-}" ADMOB_INTERSTITIAL_ID="${ADMOB_INTERSTITIAL_ID:-}" ADMOB_REWARDED_ID="${ADMOB_REWARDED_ID:-}" ADMOB_REWARDED_INTERSTITIAL_ID="${ADMOB_REWARDED_INTERSTITIAL_ID:-}" ADMOB_APP_OPEN_ID="${ADMOB_APP_OPEN_ID:-}" ADMOB_TEST_MODE="${ADMOB_TEST_MODE:-false}" \
            node "$CM_BUILD_DIR/capacitor-scripts/apply-overrides.mjs"
      - name: Install npm dependencies
        working_directory: user-project
        script: |
          set -euo pipefail
          # Use `npm install` (not `npm ci`) so the dependencies that
          # apply-overrides just added to package.json (Capacitor core/CLI/Android,
          # AdMob, Billing) get installed even when the user shipped a lockfile.
          if [ -f yarn.lock ]; then
            corepack enable && yarn install
          elif [ -f pnpm-lock.yaml ]; then
            corepack enable && pnpm install --no-frozen-lockfile
          else
            # --legacy-peer-deps avoids ERESOLVE when a user project pins a
            # different @capacitor/core major than the plugin catalog; the
            # apply-overrides step already realigns versions, this is a safety net.
            npm install --no-audit --no-fund --legacy-peer-deps
          fi
          npm ls @capacitor/core @capacitor/cli @capacitor/android @capacitor-community/admob 2>/dev/null || true
