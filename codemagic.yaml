      - name: Validate generated Android project
        script: |
          set -euo pipefail
          PROJECT_DIR="$CM_BUILD_DIR/user-project" \
          ADMOB_APP_ID="${ADMOB_APP_ID:-}" ADMOB_BANNER_ID="${ADMOB_BANNER_ID:-}" ADMOB_INTERSTITIAL_ID="${ADMOB_INTERSTITIAL_ID:-}" ADMOB_REWARDED_ID="${ADMOB_REWARDED_ID:-}" ADMOB_REWARDED_INTERSTITIAL_ID="${ADMOB_REWARDED_INTERSTITIAL_ID:-}" ADMOB_APP_OPEN_ID="${ADMOB_APP_OPEN_ID:-}" ADMOB_TEST_MODE="${ADMOB_TEST_MODE:-false}" \
            node "$CM_BUILD_DIR/capacitor-scripts/validate-build.mjs"
      - name: Decode and install release keystore
        working_directory: user-project
        script: |
          set -euo pipefail
          KS="$CM_BUILD_DIR/user-project/android/app/release.jks"
          echo "$CM_KEYSTORE" | base64 --decode > "$KS"
          test -s "$KS" || { echo "❌ Empty keystore"; exit 1; }
          # auto-detect alias if missing
          if [ -z "${CM_KEY_ALIAS:-}" ] || ! keytool -list -keystore "$KS" -storepass "$CM_KEYSTORE_PASSWORD" -alias "$CM_KEY_ALIAS" >/dev/null 2>&1; then
            CM_KEY_ALIAS="$(keytool -list -v -keystore "$KS" -storepass "$CM_KEYSTORE_PASSWORD" 2>/dev/null | awk -F': ' '/Alias name:/ {print $2; exit}')"
          fi
          if [ -z "${CM_KEY_PASSWORD:-}" ]; then CM_KEY_PASSWORD="$CM_KEYSTORE_PASSWORD"; fi
          if ! keytool -certreq -alias "$CM_KEY_ALIAS" -keystore "$KS" -storepass "$CM_KEYSTORE_PASSWORD" -keypass "$CM_KEY_PASSWORD" -file /tmp/c.csr >/dev/null 2>&1; then
            CM_KEY_PASSWORD="$CM_KEYSTORE_PASSWORD"
          fi
          echo "CM_KEYSTORE_PATH=$KS" >> "$CM_ENV"
          echo "CM_KEY_ALIAS=$CM_KEY_ALIAS" >> "$CM_ENV"
          echo "CM_KEY_PASSWORD=$CM_KEY_PASSWORD" >> "$CM_ENV"
          export CM_KEYSTORE_PATH="$KS"
          export CM_KEY_ALIAS
          export CM_KEY_PASSWORD
          # Upsert release signingConfig without creating duplicate buildTypes/release blocks.
          GRADLE="android/app/build.gradle"
          python3 - "$GRADLE" <<'PY'
          import re, sys

          path = sys.argv[1]
          src = open(path, encoding='utf-8').read()

          def find_block(text, pattern, start=0):
              m = re.search(pattern, text[start:], re.M)
              if not m:
                  return None
              open_brace = start + m.end() - 1
              depth = 0
              for i in range(open_brace, len(text)):
                  if text[i] == '{':
                      depth += 1
                  elif text[i] == '}':
                      depth -= 1
                      if depth == 0:
                          return (start + m.start(), i + 1, open_brace, i)
              raise SystemExit(f"Unclosed Gradle block for {pattern}")

          android = find_block(src, r'android\s*\{')
          if not android:
              raise SystemExit('android { } block not found in android/app/build.gradle')

          signing_release = '''
              release {
                  storeFile file(System.getenv("CM_KEYSTORE_PATH") ?: "release.jks")
                  storePassword System.getenv("CM_KEYSTORE_PASSWORD")
                  keyAlias System.getenv("CM_KEY_ALIAS")
                  keyPassword (System.getenv("CM_KEY_PASSWORD") ?: System.getenv("CM_KEYSTORE_PASSWORD"))
              }
          '''.rstrip()

          signing = find_block(src, r'signingConfigs\s*\{', android[2],)
          if signing and signing[0] < android[3]:
              release = find_block(src, r'release\s*\{', signing[2])
              if release and release[0] < signing[3]:
                  src = src[:release[0]] + signing_release + src[release[1]:]
              else:
                  src = src[:signing[3]] + '\n' + signing_release + '\n        ' + src[signing[3]:]
          else:
              block = '\n        signingConfigs {\n' + signing_release + '\n        }\n'
              src = src[:android[2] + 1] + block + src[android[2] + 1:]

          android = find_block(src, r'android\s*\{')
          build_types = find_block(src, r'buildTypes\s*\{', android[2])
          release_line = '            signingConfig signingConfigs.release'
          if build_types and build_types[0] < android[3]:
              release = find_block(src, r'release\s*\{', build_types[2])
              if release and release[0] < build_types[3]:
                  body = src[release[2] + 1:release[3]]
                  if 'signingConfig signingConfigs.release' not in body:
                      src = src[:release[2] + 1] + '\n' + release_line + src[release[2] + 1:]
              else:
                  release_block = '\n        release {\n' + release_line + '\n            minifyEnabled false\n        }\n    '
                  src = src[:build_types[3]] + release_block + src[build_types[3]:]
          else:
              block = '\n        buildTypes {\n        release {\n' + release_line + '\n            minifyEnabled false\n        }\n    }\n'
              src = src[:android[3]] + block + src[android[3]:]

          open(path, 'w', encoding='utf-8').write(src)
          print('✅ Release signingConfig wired into android/app/build.gradle')
          PY
      - name: Align Gradle dependency versions
        working_directory: user-project/android
        script: |
          set -euo pipefail
          WRAPPER_PROPS="gradle/wrapper/gradle-wrapper.properties"
          if [ -f "$WRAPPER_PROPS" ]; then
            python3 - "$WRAPPER_PROPS" <<'PY'
          import re, sys
          path = sys.argv[1]
          text = open(path, encoding='utf-8').read()
          text = re.sub(r'^distributionUrl=.*$', r'distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip', text, flags=re.M)
          open(path, 'w', encoding='utf-8').write(text)
          PY
            echo "✅ Gradle wrapper pinned to 8.7 for Java 21 compatibility"
          fi
          # Some uploaded Capacitor projects still generate AGP 8.2.x, which can
          # repeatedly fail in the final bundle step with modern dependency jars.
          # Align it with the wrapper/JDK used by this workflow before Gradle runs.
          ROOT_GRADLE="build.gradle"
          python3 - "$ROOT_GRADLE" <<'PY'
          import re, sys
          path = sys.argv[1]
          text = open(path, encoding='utf-8').read()
          text = re.sub(r"id\s+['\"]com\.android\.application['\"]\s+version\s+['\"][^'\"]+['\"]", "id 'com.android.application' version '8.6.1'", text)
          text = re.sub(r"id\s+['\"]com\.android\.library['\"]\s+version\s+['\"][^'\"]+['\"]", "id 'com.android.library' version '8.6.1'", text)
          text = re.sub(r"classpath\s+['\"]com\.android\.tools\.build:gradle:[^'\"]+['\"]", "classpath 'com.android.tools.build:gradle:8.6.1'", text)
          open(path, 'w', encoding='utf-8').write(text)
          PY
          echo "✅ Android Gradle Plugin aligned to 8.6.1"
          # Capacitor plugins commonly drag in kotlin-stdlib-jdk7/jdk8:1.6.21 while
          # AGP 8.x ships kotlin-stdlib:1.8.22+. In Kotlin 1.8+ jdk7/jdk8 are merged
          # into the main stdlib, so mixing the two produces:
          #   "Duplicate class kotlin.collections.jdk8.CollectionsJDK8Kt"
          # Force every kotlin-stdlib* artifact to a single modern version.
          MARKER="// LOVABLE_KOTLIN_STDLIB_ALIGN"
          if ! grep -q "$MARKER" "$ROOT_GRADLE"; then
            {
              echo ""
              echo "// LOVABLE_KOTLIN_STDLIB_ALIGN"
              echo "allprojects {"
              echo "    configurations.all {"
              echo "        resolutionStrategy.eachDependency { details ->"
              echo "            if (details.requested.group == 'org.jetbrains.kotlin'"
              echo "                && details.requested.name.startsWith('kotlin-stdlib')) {"
              echo "                details.useVersion '1.9.24'"
              echo "                details.because 'Align all kotlin-stdlib* artifacts to avoid duplicate classes'"
              echo "            }"
              echo "        }"
              echo "    }"
              echo "}"
            } >> "$ROOT_GRADLE"
            echo "✅ Appended Kotlin stdlib alignment to android/build.gradle"
          else
            echo "Kotlin stdlib alignment already present"
          fi
          BC_MARKER="// LOVABLE_BOUNCY_CASTLE_JDK17_ALIGN"
          if ! grep -q "$BC_MARKER" "$ROOT_GRADLE"; then
            {
              echo ""
              echo "// LOVABLE_BOUNCY_CASTLE_JDK17_ALIGN"
              echo "allprojects {"
              echo "    configurations.all {"
              echo "        resolutionStrategy.eachDependency { details ->"
              echo "            if (details.requested.group == 'org.bouncycastle') {"
              echo "                def name = details.requested.name"
              echo "                if (name.endsWith('-jdk15on')) {"
              echo "                    details.useVersion '1.70'"
              echo "                    details.because 'Bouncy Castle jdk15on 1.70 avoids Java 21 bytecode in newer multi-release jars'"
              echo "                } else if (name.endsWith('-jdk18on')) {"
              echo "                    def replacement = name.replace('-jdk18on', '-jdk15on')"
              echo "                    details.useTarget group: 'org.bouncycastle', name: replacement, version: '1.70'"
              echo "                    details.because 'Use Bouncy Castle jdk15on 1.70 because jdk18on 1.78+ ships Java 21 classes that Gradle on JDK 17 cannot instrument'"
              echo "                }"
              echo "            }"
              echo "        }"
              echo "        resolutionStrategy.force 'org.bouncycastle:bcprov-jdk15on:1.70', 'org.bouncycastle:bcpkix-jdk15on:1.70', 'org.bouncycastle:bcutil-jdk15on:1.70', 'org.bouncycastle:bctls-jdk15on:1.70'"
              echo "    }"
              echo "}"
            } >> "$ROOT_GRADLE"
            echo "✅ Pinned Bouncy Castle dependencies to jdk15on 1.70 for JDK 17 Android builds"
          else
            echo "Bouncy Castle JDK 17 alignment already present"
          fi
          GPS_MARKER="// LOVABLE_GOOGLE_PLAY_SERVICES_MINSDK22_ALIGN"
          if ! grep -q "$GPS_MARKER" "$ROOT_GRADLE"; then
            cat >> "$ROOT_GRADLE" <<'GRADLE'

          // LOVABLE_GOOGLE_PLAY_SERVICES_MINSDK22_ALIGN
          allprojects {
              configurations.all {
                  resolutionStrategy.eachDependency { details ->
                      if (details.requested.group == 'com.google.android.gms') {
                          def forced = [
                              'play-services-ads': '23.6.0',
                              'play-services-ads-lite': '23.6.0',
                              'play-services-ads-base': '23.6.0',
                              'play-services-ads-identifier': '18.0.0',
                              'play-services-appset': '16.0.1',
                              'play-services-base': '18.7.2',
                              'play-services-basement': '18.7.1',
                              'play-services-tasks': '18.3.2'
                          ][details.requested.name]
                          if (forced != null) {
                              details.useVersion forced
                              details.because 'Keep Google Play services compatible with app minSdk 22; newer releases require minSdk 23+'
                          }
                      }
                      if (details.requested.group == 'com.google.android.ump' && details.requested.name == 'user-messaging-platform') {
                          details.useVersion '3.0.0'
                          details.because 'Mobile Ads 23.6.0 companion UMP release remains compatible with minSdk 22'
                      }
                  }
                  resolutionStrategy.force(
                      'com.google.android.gms:play-services-ads:23.6.0',
                      'com.google.android.gms:play-services-ads-lite:23.6.0',
                      'com.google.android.gms:play-services-ads-base:23.6.0',
                      'com.google.android.gms:play-services-ads-identifier:18.0.0',
                      'com.google.android.gms:play-services-appset:16.0.1',
                      'com.google.android.gms:play-services-base:18.7.2',
                      'com.google.android.gms:play-services-basement:18.7.1',
                      'com.google.android.gms:play-services-tasks:18.3.2',
                      'com.google.android.ump:user-messaging-platform:3.0.0'
                  )
              }
          }
          GRADLE
            echo "✅ Pinned Google Play services / Mobile Ads to minSdk 22-compatible versions"
          else
            echo "Google Play services minSdk 22 alignment already present"
          fi
          INIT_SCRIPT="$HOME/.gradle/init.d/lovable-bouncycastle-jdk17.gradle"
          test -f "$INIT_SCRIPT" && grep -q 'LOVABLE_BOUNCY_CASTLE_JDK17_INIT' "$INIT_SCRIPT"
          grep -R "LOVABLE_BOUNCY_CASTLE_JDK17_ALIGN\|LOVABLE_GOOGLE_PLAY_SERVICES_MINSDK22_ALIGN" -n build.gradle app/build.gradle || true
      - name: Build Android App Bundle
        working_directory: user-project/android
        script: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re, sys

          app = Path('app/build.gradle')
          variables = Path('variables.gradle')
          for path in (app, variables):
              if not path.exists():
                  continue
              text = path.read_text(encoding='utf-8')
              replacements = [
                  (r'compileSdkVersion\s+rootProject\.ext\.compileSdkVersion', 'compileSdk 35'),
                  (r'compileSdk\s+rootProject\.ext\.compileSdkVersion', 'compileSdk 35'),
                  (r'compileSdkVersion\s*=\s*rootProject\.ext\.compileSdkVersion', 'compileSdkVersion = 35'),
                  (r'compileSdk\s*=\s*rootProject\.ext\.compileSdkVersion', 'compileSdk = 35'),
                  (r'targetSdkVersion\s+rootProject\.ext\.targetSdkVersion', 'targetSdk 35'),
                  (r'targetSdk\s+rootProject\.ext\.targetSdkVersion', 'targetSdk 35'),
                  (r'targetSdkVersion\s*=\s*rootProject\.ext\.targetSdkVersion', 'targetSdkVersion = 35'),
                  (r'targetSdk\s*=\s*rootProject\.ext\.targetSdkVersion', 'targetSdk = 35'),
                  (r'minSdkVersion\s+rootProject\.ext\.minSdkVersion', 'minSdk 22'),
                  (r'minSdk\s+rootProject\.ext\.minSdkVersion', 'minSdk 22'),
                  (r'minSdkVersion\s*=\s*rootProject\.ext\.minSdkVersion', 'minSdkVersion = 22'),
                  (r'minSdk\s*=\s*rootProject\.ext\.minSdkVersion', 'minSdk = 22'),
                  (r'compileSdkVersion\s+\d+', 'compileSdkVersion 35'),
                  (r'compileSdk\s+\d+', 'compileSdk 35'),
                  (r'compileSdkVersion\s*=\s*\d+', 'compileSdkVersion = 35'),
                  (r'compileSdk\s*=\s*\d+', 'compileSdk = 35'),
                  (r'compileSdkVersion\(\s*\d+\s*\)', 'compileSdkVersion(35)'),
                  (r'compileSdk\(\s*\d+\s*\)', 'compileSdk(35)'),
                  (r'targetSdkVersion\s+\d+', 'targetSdkVersion 35'),
                  (r'targetSdk\s+\d+', 'targetSdk 35'),
                  (r'targetSdkVersion\s*=\s*\d+', 'targetSdkVersion = 35'),
                  (r'targetSdk\s*=\s*\d+', 'targetSdk = 35'),
                  (r'targetSdkVersion\(\s*\d+\s*\)', 'targetSdkVersion(35)'),
                  (r'targetSdk\(\s*\d+\s*\)', 'targetSdk(35)'),
                  (r'minSdkVersion\s+\d+', 'minSdkVersion 22'),
                  (r'minSdk\s+\d+', 'minSdk 22'),
                  (r'minSdkVersion\s*=\s*\d+', 'minSdkVersion = 22'),
                  (r'minSdk\s*=\s*\d+', 'minSdk = 22'),
                  (r'minSdkVersion\(\s*\d+\s*\)', 'minSdkVersion(22)'),
                  (r'minSdk\(\s*\d+\s*\)', 'minSdk(22)'),
              ]
              for pattern, replacement in replacements:
                  text = re.sub(pattern, replacement, text)
              if path == app:
                  if 'compileSdk' not in text and 'compileSdkVersion' not in text:
                      text = re.sub(r'android\s*\{', 'android {\n    compileSdk 35', text, count=1)
                  if 'targetSdk' not in text and 'targetSdkVersion' not in text:
                      text = re.sub(r'defaultConfig\s*\{', 'defaultConfig {\n        targetSdk 35', text, count=1)
                  if 'minSdk' not in text and 'minSdkVersion' not in text:
                      text = re.sub(r'defaultConfig\s*\{', 'defaultConfig {\n        minSdk 22', text, count=1)
              path.write_text(text, encoding='utf-8')

          app_text = app.read_text(encoding='utf-8')
          checks = {
              'compileSdk': re.search(r'compileSdk(?:Version)?\s*(?:=|\()?\s*(\d+)', app_text),
              'targetSdk': re.search(r'targetSdk(?:Version)?\s*(?:=|\()?\s*(\d+)', app_text),
              'minSdk': re.search(r'minSdk(?:Version)?\s*(?:=|\()?\s*(\d+)', app_text),
          }
          expected = {'compileSdk': '35', 'targetSdk': '35', 'minSdk': '22'}
          for name, match in checks.items():
              if not match or match.group(1) != expected[name]:
                  raise SystemExit(f'❌ {name} is {match.group(1) if match else "missing"}; expected {expected[name]} before Gradle build')
          print('✅ Final Android SDK check passed: compileSdk 35, targetSdk 35, minSdk 22')
          PY
          chmod +x ./gradlew
          INIT_SCRIPT="$HOME/.gradle/init.d/lovable-bouncycastle-jdk17.gradle"
          test -f "$INIT_SCRIPT" && grep -q 'LOVABLE_BOUNCY_CASTLE_JDK17_INIT' "$INIT_SCRIPT"
          BUILD_TYPE="${BUILD_TYPE:-aab}"
          case "$BUILD_TYPE" in
            apk)  ./gradlew --init-script "$INIT_SCRIPT" --refresh-dependencies :app:assembleRelease --no-daemon --stacktrace ;;
            both) ./gradlew --init-script "$INIT_SCRIPT" --refresh-dependencies :app:assembleRelease :app:bundleRelease --no-daemon --stacktrace ;;
            *)    ./gradlew --init-script "$INIT_SCRIPT" --refresh-dependencies :app:bundleRelease --no-daemon --stacktrace ;;
          esac
    artifacts:
      - user-project/android/app/build/outputs/**/*.aab
      - user-project/android/app/build/outputs/**/*.apk
      - user-project/android/app/build/outputs/**/mapping.txt
      - /tmp/cap-sync.log
