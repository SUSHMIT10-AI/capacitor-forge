            node "$CM_BUILD_DIR/capacitor-scripts/apply-overrides.mjs"
      - name: Force Android SDK compatibility
        working_directory: user-project
        script: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          files = [Path('android/app/build.gradle'), Path('android/variables.gradle')]
          for path in files:
              if not path.exists():
                  continue
              text = path.read_text(encoding='utf-8')
              text = re.sub(r'compileSdkVersion\s+rootProject\.ext\.compileSdkVersion', 'compileSdk 35', text)
              text = re.sub(r'compileSdk\s+rootProject\.ext\.compileSdkVersion', 'compileSdk 35', text)
              text = re.sub(r'compileSdkVersion\s*=\s*rootProject\.ext\.compileSdkVersion', 'compileSdkVersion = 35', text)
              text = re.sub(r'compileSdk\s*=\s*rootProject\.ext\.compileSdkVersion', 'compileSdk = 35', text)
              text = re.sub(r'targetSdkVersion\s+rootProject\.ext\.targetSdkVersion', 'targetSdk 35', text)
              text = re.sub(r'targetSdk\s+rootProject\.ext\.targetSdkVersion', 'targetSdk 35', text)
              text = re.sub(r'targetSdkVersion\s*=\s*rootProject\.ext\.targetSdkVersion', 'targetSdkVersion = 35', text)
              text = re.sub(r'targetSdk\s*=\s*rootProject\.ext\.targetSdkVersion', 'targetSdk = 35', text)
              text = re.sub(r'minSdkVersion\s+rootProject\.ext\.minSdkVersion', 'minSdk 22', text)
              text = re.sub(r'minSdk\s+rootProject\.ext\.minSdkVersion', 'minSdk 22', text)
              text = re.sub(r'minSdkVersion\s*=\s*rootProject\.ext\.minSdkVersion', 'minSdkVersion = 22', text)
              text = re.sub(r'minSdk\s*=\s*rootProject\.ext\.minSdkVersion', 'minSdk = 22', text)
              text = re.sub(r'compileSdkVersion\s+\d+', 'compileSdkVersion 35', text)
              text = re.sub(r'compileSdk\s+\d+', 'compileSdk 35', text)
              text = re.sub(r'compileSdkVersion\s*=\s*\d+', 'compileSdkVersion = 35', text)
              text = re.sub(r'compileSdk\s*=\s*\d+', 'compileSdk = 35', text)
              text = re.sub(r'compileSdkVersion\(\s*\d+\s*\)', 'compileSdkVersion(35)', text)
              text = re.sub(r'compileSdk\(\s*\d+\s*\)', 'compileSdk(35)', text)
              text = re.sub(r'targetSdkVersion\s+\d+', 'targetSdkVersion 35', text)
              text = re.sub(r'targetSdk\s+\d+', 'targetSdk 35', text)
              text = re.sub(r'targetSdkVersion\s*=\s*\d+', 'targetSdkVersion = 35', text)
              text = re.sub(r'targetSdk\s*=\s*\d+', 'targetSdk = 35', text)
              text = re.sub(r'targetSdkVersion\(\s*\d+\s*\)', 'targetSdkVersion(35)', text)
              text = re.sub(r'targetSdk\(\s*\d+\s*\)', 'targetSdk(35)', text)
              text = re.sub(r'minSdkVersion\s+\d+', 'minSdkVersion 22', text)
              text = re.sub(r'minSdk\s+\d+', 'minSdk 22', text)
              text = re.sub(r'minSdkVersion\s*=\s*\d+', 'minSdkVersion = 22', text)
              text = re.sub(r'minSdk\s*=\s*\d+', 'minSdk = 22', text)
              text = re.sub(r'minSdkVersion\(\s*\d+\s*\)', 'minSdkVersion(22)', text)
              text = re.sub(r'minSdk\(\s*\d+\s*\)', 'minSdk(22)', text)
              if path.name == 'build.gradle':
                  if 'compileSdk' not in text and 'compileSdkVersion' not in text:
                      text = re.sub(r'android\s*\{', 'android {\n    compileSdk 35', text, count=1)
                  if 'targetSdk' not in text and 'targetSdkVersion' not in text:
                      text = re.sub(r'defaultConfig\s*\{', 'defaultConfig {\n        targetSdk 35', text, count=1)
                  if 'minSdk' not in text and 'minSdkVersion' not in text:
                      text = re.sub(r'defaultConfig\s*\{', 'defaultConfig {\n        minSdk 22', text, count=1)
              path.write_text(text, encoding='utf-8')
          print('✅ Android SDK locked to compileSdk 35, targetSdk 35, and minSdk 22')
          PY
      - name: Capacitor sync (link plugins + copy web assets)
        working_directory: user-project
        script: |
          set -euo pipefail
          npx cap sync android 2>&1 | tee /tmp/cap-sync.log
          echo "---- Detected Capacitor plugins ----"
